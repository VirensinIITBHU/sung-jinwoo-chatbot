
<!DOCTYPE html>
<html>

<head>

    <title>VIREN Chatbot</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;700&display=swap"
        rel="stylesheet"
    >

</head>

<body class="
    bg-black
    text-white
    h-screen

    flex
    justify-center
    items-center

    overflow-hidden
    overscroll-none

    font-['Rajdhani']
">

    <!-- BACKGROUND GLOW -->

    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">

        <div class="
            absolute
            w-[700px]
            h-[700px]
            bg-purple-700/30
            blur-3xl
            rounded-full
            top-[-200px]
            left-[-200px]
            animate-pulse
        ">
        </div>

        <div class="
            absolute
            w-[600px]
            h-[600px]
            bg-blue-700/20
            blur-3xl
            rounded-full
            bottom-[-200px]
            right-[-100px]
            animate-pulse
        ">
        </div>

    </div>

    <!-- MAIN CONTAINER -->

    <div class="
        w-full

        max-w-4xl

        h-[100vh]
        md:h-[92vh]

        mx-2
        md:mx-4

        bg-white/5

        backdrop-blur-2xl

        border
        border-white/10

        rounded-none
        md:rounded-[32px]

        shadow-[0_0_50px_rgba(168,85,247,0.15)]

        overflow-hidden

        flex
        flex-col
    ">

        <!-- HEADER -->

        <div class="
            bg-black/20
            backdrop-blur-xl

            border-b
            border-white/10

            px-4
            md:px-8

            py-4
            md:py-5
        ">

            <h1 class="
                text-2xl
                sm:text-3xl
                md:text-5xl

                font-bold

                font-['Orbitron']

                tracking-wide
                md:tracking-widest

                text-purple-300

                drop-shadow-[0_0_20px_rgba(168,85,247,0.9)]

                animate-pulse
            ">
                VIREN Chatbot
            </h1>

            <p class="text-zinc-400 mt-2 text-sm md:text-base">
                Sung Jin-Woo AI Assistant
            </p>

        </div>

        <!-- CHAT AREA -->

        <div
            id="chat"
            class="
                flex-1
                overflow-y-auto

                p-3
                sm:p-4
                md:p-6

                space-y-4
                md:space-y-6
            "
        >

        </div>

        <!-- INPUT AREA -->

        <div class="
            p-3
            sm:p-4
            md:p-5

            border-t
            border-white/10

            bg-black/20

            backdrop-blur-xl

            flex
            gap-2
            md:gap-3
        ">

            <input
                type="text"
                id="messageInput"
                placeholder="Command the shadows..."
                class="
                    flex-1

                    min-w-0

                    text-sm
                    md:text-base

                    bg-white/5

                    border
                    border-white/10

                    rounded-2xl

                    px-4
                    md:px-5

                    py-3
                    md:py-4

                    text-white

                    outline-none

                    backdrop-blur-lg

                    focus:border-purple-500
                    focus:ring-2
                    focus:ring-purple-500/30

                    transition
                "
            >

            <button
                onclick="sendMessage()"
                class="
                    bg-purple-600
                    hover:bg-purple-700

                    px-4
                    md:px-6

                    py-3
                    md:py-4

                    text-sm
                    md:text-base

                    rounded-2xl

                    font-semibold

                    transition

                    shadow-lg
                    shadow-purple-500/20

                    shrink-0
                "
            >
                Arise
            </button>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

        document
            .getElementById("messageInput")
            .addEventListener("keydown", function(event) {

                if (event.key === "Enter") {
                    sendMessage()
                }
        })

        async function sendMessage() {

            const input =
                document.getElementById("messageInput")

            const message =
                input.value

            if (message.trim() === "") {
                return
            }

            const chat =
                document.getElementById("chat")

            // USER MESSAGE

            const userMessage =
            `
                <div class="flex justify-end">

                    <div class="
                        bg-blue-600/80
                        backdrop-blur-lg

                        text-white

                        px-4
                        md:px-5

                        py-3
                        md:py-4

                        rounded-3xl

                        max-w-[90%]
                        md:max-w-[75%]

                        text-sm
                        md:text-base

                        shadow-lg
                    ">

                        <b>You:</b><br>
                        ${message}

                    </div>

                </div>
            `

            chat.innerHTML += userMessage

            // ASSISTANT WRAPPER

            const assistantWrapper =
                document.createElement("div")

            assistantWrapper.className =
                "flex justify-start"

            // ASSISTANT BUBBLE

            const assistantBubble =
                document.createElement("div")

            assistantBubble.className =
            `
                bg-purple-900/40

                border
                border-purple-500/20

                backdrop-blur-xl

                text-white

                px-4
                md:px-5

                py-3
                md:py-4

                rounded-3xl

                max-w-[90%]
                md:max-w-[75%]

                text-sm
                md:text-base

                shadow-lg
                shadow-purple-500/10

                whitespace-pre-wrap
            `

            assistantBubble.innerHTML =
                "<b>Sung JIN Woo:</b><br>"

            assistantWrapper.appendChild(
                assistantBubble
            )

            chat.appendChild(
                assistantWrapper
            )

            input.value = ""

            chat.scrollTop =
                chat.scrollHeight

            // FETCH STREAM

            const response = await fetch(
                "/chat",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({
                        message: message
                    })
                }
            )

            const reader =
                response.body.getReader()

            const decoder =
                new TextDecoder()

            while (true) {

                const { done, value } =
                    await reader.read()

                if (done) {

                    assistantBubble.innerHTML =
                        assistantBubble.innerHTML
                        .replace("▋", "")

                    break
                }

                const chunk =
                    decoder.decode(value)

                assistantBubble.innerHTML =
                    assistantBubble.innerHTML
                    .replace("▋", "")

                assistantBubble.innerHTML +=
                    chunk + "<span class='animate-pulse'>▋</span>"

                chat.scrollTop =
                    chat.scrollHeight
            }
        }

    </script>

    <!-- SCROLLBAR -->

    <style>

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(168,85,247,0.4);
            border-radius: 999px;
        }

    </style>

</body>

</html>
