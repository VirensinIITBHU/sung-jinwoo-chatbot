<!DOCTYPE html>
<html>

<head>

    <title >VIREN Chatbot</title>

    <script src="https://cdn.tailwindcss.com"></script>

    
<link
    rel="preconnect"
    href="https://fonts.googleapis.com"
>

<link
    rel="preconnect"
    href="https://fonts.gstatic.com"
    crossorigin
>

<link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700&family=Rajdhani:wght@400;500;700&display=swap"
    rel="stylesheet"
>


</head>

<body class="
    bg-black
    text-white
    h-screen

    flex
    justify-center
    items-center

    overflow-hidden

    font-['Rajdhani']
">


    <!-- BACKGROUND GLOW -->

    <div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none">

        <div class="
            absolute
            w-[700px]
            h-[700px]
            bg-purple-700/30
            blur-3xl
            rounded-full
            top-[-200px]
            left-[-200px]
            animate-pulse
        ">
        </div>

        <div class="
            absolute
            w-[600px]
            h-[600px]
            bg-blue-700/20
            blur-3xl
            rounded-full
            bottom-[-200px]
            right-[-100px]
            animate-pulse
        ">
        </div>

    </div>

    <!-- MAIN CONTAINER -->

    <div class="
        w-full
        max-w-4xl
        h-[92vh]

        bg-white/5

        backdrop-blur-2xl

        border
        border-white/10

        rounded-[32px]

        shadow-[0_0_50px_rgba(168,85,247,0.15)]

        overflow-hidden

        flex
        flex-col
    ">

        <!-- HEADER -->

        <div class="
            bg-black/20
            backdrop-blur-xl

            border-b
            border-white/10

            px-8
            py-5
        ">

            <h1 class="
                
    text-5xl
    font-bold

    font-['Orbitron']

    tracking-widest

    text-purple-300

    drop-shadow-[0_0_20px_rgba(168,85,247,0.9)]

    animate-pulse
"


            ">
                VIREN Chatbot
            </h1>

            <p class="text-zinc-400 mt-2">
                Sung Jin-Woo AI Assistant
            </p>

        </div>

        <!-- CHAT AREA -->

        <div
            id="chat"
            class="
                flex-1
                overflow-y-auto
                p-6
                space-y-6
            "
        >

        </div>

        <!-- INPUT AREA -->

        <div class="
            p-5

            border-t
            border-white/10

            bg-black/20

            backdrop-blur-xl

            flex
            gap-3
        ">

            <input
                type="text"
                id="messageInput"
                placeholder="Command the shadows..."
                class="
                    flex-1

                    bg-white/5

                    border
                    border-white/10

                    rounded-2xl

                    px-5
                    py-4

                    text-white

                    outline-none

                    backdrop-blur-lg

                    focus:border-purple-500
                    focus:ring-2
                    focus:ring-purple-500/30

                    transition
                "
            >

            <button
                onclick="sendMessage()"
                class="
                    bg-purple-600
                    hover:bg-purple-700

                    px-6
                    py-4

                    rounded-2xl

                    font-semibold

                    transition

                    shadow-lg
                    shadow-purple-500/20
                "
            >
                Arise
            </button>

        </div>

    </div>

    <!-- SCRIPT -->

    <script>

        // ENTER KEY SUPPORT

        document
            .getElementById("messageInput")
            .addEventListener("keydown", function(event) {

                if (event.key === "Enter") {

                    sendMessage()
                }
        })

        // MAIN CHAT FUNCTION

        async function sendMessage() {

            const input =
                document.getElementById("messageInput")

            const message =
                input.value

            // prevent empty messages

            if (message.trim() === "") {
                return
            }

            const chat =
                document.getElementById("chat")

            // USER MESSAGE

            const userMessage =
            `
                <div class="flex justify-end">

                    <div class="
                        bg-blue-600/80
                        backdrop-blur-lg

                        text-white

                        px-5
                        py-4

                        rounded-3xl

                        max-w-[75%]

                        shadow-lg
                    ">

                        <b>You:</b><br>
                        ${message}

                    </div>

                </div>
            `

            chat.innerHTML += userMessage

            // ASSISTANT WRAPPER

            const assistantWrapper =
                document.createElement("div")

            assistantWrapper.className =
                "flex justify-start"

            // ASSISTANT BUBBLE

            const assistantBubble =
                document.createElement("div")

            assistantBubble.className =
            `
                bg-purple-900/40

                border
                border-purple-500/20

                backdrop-blur-xl

                text-white

                px-5
                py-4

                rounded-3xl

                max-w-[75%]

                shadow-lg
                shadow-purple-500/10

                whitespace-pre-wrap
            `

            assistantBubble.innerHTML =
                "<b>Sung JIN Woo:</b><br>"

            assistantWrapper.appendChild(
                assistantBubble
            )

            chat.appendChild(
                assistantWrapper
            )

            // clear input

            input.value = ""

            // auto scroll

            chat.scrollTop =
                chat.scrollHeight

            // FETCH STREAM

            const response = await fetch(
                "/chat",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                        "application/json"
                    },

                    body: JSON.stringify({
                        message: message
                    })
                }
            )

            // STREAM READER

            const reader =
                response.body.getReader()

            const decoder =
                new TextDecoder()

            // STREAM LOOP

            
while (true) {

    const { done, value } =
        await reader.read()

    if (done) {

        // remove cursor when stream ends

        assistantBubble.innerHTML =
            assistantBubble.innerHTML
            .replace("▋", "")

        break
    }

    const chunk =
        decoder.decode(value)

    // remove old cursor first

    assistantBubble.innerHTML =
        assistantBubble.innerHTML
        .replace("▋", "")

    // append new text + cursor

    assistantBubble.innerHTML +=
        chunk + "<span class='animate-pulse'>▋</span>"

    // auto scroll

    chat.scrollTop =
        chat.scrollHeight
}


        }

    </script>

</body>

</html>
